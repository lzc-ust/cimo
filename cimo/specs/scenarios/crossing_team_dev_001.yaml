meta:
  spec_version: "1.0"
  scenario_id: "crossing_team_dev_001"
  suite: "CIMO-Core"
  motif: "CrossingTeam"
  split: "dev"
  seed: 202

imports:
  - ../catalogs/units.yaml
  - ../catalogs/objects.yaml
  - ../catalogs/terrains.yaml
  - ../catalogs/transitions.yaml
  - ../catalogs/team_modes.yaml
  - ../catalogs/target_profiles.yaml

catalogs: {}

# -----------------------------------------------------------------------
# CrossingTeam dev: tighter deadline + river disturbance forces bridge detour
#
#   [bank_west] --river_gap--> [bank_east]
#   [bank_west] --road_lane--> [bridge_south] --road_lane--> [bank_east]
#   [bank_east] --indoor_corridor--> [warehouse]
#
#   Disturbance: river blocked at tick 0 (initial), resolves at tick 100
#   This forces rover to use bridge route first.
# -----------------------------------------------------------------------
world:
  nodes:
    - node_id: "bank_west"
      label: "West River Bank"
      environment_class: outdoor
      x: 0.0
      y: 0.0
      z: 0.0
      is_recharge_point: true

    - node_id: "bank_east"
      label: "East River Bank"
      environment_class: outdoor
      x: 30.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

    - node_id: "bridge_south"
      label: "South Bridge"
      environment_class: outdoor
      x: 15.0
      y: -20.0
      z: 0.0
      is_recharge_point: false

    - node_id: "warehouse"
      label: "East Warehouse"
      environment_class: indoor
      x: 45.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

  edges:
    - edge_id: "e_river"
      source: "bank_west"
      target: "bank_east"
      terrain_type: river_gap
      distance: 30.0
      bidirectional: true

    - edge_id: "e_west_bridge"
      source: "bank_west"
      target: "bridge_south"
      terrain_type: road_lane
      distance: 25.0
      bidirectional: true

    - edge_id: "e_bridge_east"
      source: "bridge_south"
      target: "bank_east"
      terrain_type: road_lane
      distance: 25.0
      bidirectional: true

    - edge_id: "e_east_warehouse"
      source: "bank_east"
      target: "warehouse"
      terrain_type: indoor_corridor
      distance: 15.0
      transition_type: loading_dock
      bidirectional: true

initial_state:
  units:
    - unit_id: "scout_01"
      unit_type: aerial_scout
      location: "bank_west"

    - unit_id: "rover_01"
      unit_type: inspection_rover
      location: "bank_west"

  objects:
    - object_id: "toolkit_01"
      object_type: toolkit
      location: "bank_west"

  targets:
    - target_id: "tgt_warehouse"
      target_type: assessment
      location: "warehouse"
      metadata:
        description: "Warehouse inspection target"

workload:
  missions:
    - mission_id: "m_relocate_rover"
      family: relocate_unit
      priority: high
      release_tick: 0
      deadline_tick: 500
      connectivity_requirement: none
      risk_budget: 8.0
      assigned_units:
        - "scout_01"
        - "rover_01"
      params:
        unit_id: "rover_01"
        destination_node: "warehouse"

    - mission_id: "m_inspect_warehouse"
      family: assess_target
      priority: medium
      release_tick: 0
      deadline_tick: 600
      connectivity_requirement: none
      risk_budget: 4.0
      assigned_units:
        - "rover_01"
      dependencies:
        - type: finish_before_start
          from: "m_relocate_rover"
      params:
        target_id: "tgt_warehouse"
        assessment_mode: verify

# River temporarily blocked at start; forces bridge route
disturbances:
  - disturbance_id: "d_river_flood"
    trigger_tick: 0
    resolve_tick: 100
    affected_edges:
      - "e_river"
      - "e_river_rev"
    affected_nodes: []
    effect: block
    magnitude: 1.0

benchmark:
  max_ticks: 700
  record_interval: 10
  reward_shaping: none

generators: {}
