meta:
  spec_version: "1.0"
  scenario_id: "crossing_team_test_001"
  suite: "CIMO-Core"
  motif: "CrossingTeam"
  split: "test"
  seed: 402

imports:
  - ../catalogs/units.yaml
  - ../catalogs/objects.yaml
  - ../catalogs/terrains.yaml
  - ../catalogs/transitions.yaml
  - ../catalogs/team_modes.yaml
  - ../catalogs/target_profiles.yaml

catalogs: {}

# -----------------------------------------------------------------------
# CrossingTeam test: both river AND bridge blocked at different times
# Forces precise timing of airlift window.
# River blocked tick 0-60, bridge blocked tick 40-120 (overlap gap!)
# Agent must airlift in the overlap window (tick 60+) or wait.
# -----------------------------------------------------------------------
world:
  nodes:
    - node_id: "bank_west"
      label: "West River Bank"
      environment_class: outdoor
      x: 0.0
      y: 0.0
      z: 0.0
      is_recharge_point: true

    - node_id: "bank_east"
      label: "East River Bank"
      environment_class: outdoor
      x: 30.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

    - node_id: "bridge_south"
      label: "South Bridge"
      environment_class: outdoor
      x: 15.0
      y: -20.0
      z: 0.0
      is_recharge_point: false

    - node_id: "warehouse"
      label: "East Warehouse"
      environment_class: indoor
      x: 45.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

  edges:
    - edge_id: "e_river"
      source: "bank_west"
      target: "bank_east"
      terrain_type: river_gap
      distance: 30.0
      bidirectional: true

    - edge_id: "e_west_bridge"
      source: "bank_west"
      target: "bridge_south"
      terrain_type: road_lane
      distance: 25.0
      bidirectional: true

    - edge_id: "e_bridge_east"
      source: "bridge_south"
      target: "bank_east"
      terrain_type: road_lane
      distance: 25.0
      bidirectional: true

    - edge_id: "e_east_warehouse"
      source: "bank_east"
      target: "warehouse"
      terrain_type: indoor_corridor
      distance: 15.0
      transition_type: loading_dock
      bidirectional: true

initial_state:
  units:
    - unit_id: "scout_01"
      unit_type: aerial_scout
      location: "bank_west"

    - unit_id: "rover_01"
      unit_type: inspection_rover
      location: "bank_west"

  objects:
    - object_id: "toolkit_01"
      object_type: toolkit
      location: "bank_west"

  targets:
    - target_id: "tgt_warehouse"
      target_type: assessment
      location: "warehouse"
      metadata:
        description: "Warehouse inspection target"

workload:
  missions:
    - mission_id: "m_relocate_rover"
      family: relocate_unit
      priority: high
      release_tick: 0
      deadline_tick: 420
      connectivity_requirement: none
      risk_budget: 8.0
      assigned_units:
        - "scout_01"
        - "rover_01"
      params:
        unit_id: "rover_01"
        destination_node: "warehouse"

    - mission_id: "m_inspect_warehouse"
      family: assess_target
      priority: high
      release_tick: 0
      deadline_tick: 500
      connectivity_requirement: none
      risk_budget: 4.0
      assigned_units:
        - "rover_01"
      dependencies:
        - type: finish_before_start
          from: "m_relocate_rover"
      params:
        target_id: "tgt_warehouse"
        assessment_mode: diagnose

disturbances:
  - disturbance_id: "d_river_flood"
    trigger_tick: 0
    resolve_tick: 60
    affected_edges:
      - "e_river"
      - "e_river_rev"
    affected_nodes: []
    effect: block
    magnitude: 1.0

  - disturbance_id: "d_bridge_collapse"
    trigger_tick: 40
    resolve_tick: 120
    affected_edges:
      - "e_west_bridge"
      - "e_west_bridge_rev"
      - "e_bridge_east"
      - "e_bridge_east_rev"
    affected_nodes: []
    effect: block
    magnitude: 1.0

benchmark:
  max_ticks: 600
  record_interval: 10
  reward_shaping: none

generators: {}
