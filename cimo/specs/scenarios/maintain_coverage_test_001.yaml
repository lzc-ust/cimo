meta:
  spec_version: "1.0"
  scenario_id: "maintain_coverage_test_001"
  suite: "CIMO-Pref"
  motif: "ShadowService"
  split: "test"
  seed: 1051

imports:
  - ../catalogs/units.yaml
  - ../catalogs/objects.yaml
  - ../catalogs/terrains.yaml
  - ../catalogs/transitions.yaml
  - ../catalogs/team_modes.yaml
  - ../catalogs/target_profiles.yaml

catalogs: {}

# -----------------------------------------------------------------------
# MaintainCoverage test:
#   Four coverage targets, two relays, one relay must recharge mid-episode.
#   Relay_01 starts with low energy, relay_02 must cover during recharge.
#   One coverage zone has a road temporarily blocked (relay must reroute).
# -----------------------------------------------------------------------
world:
  nodes:
    - node_id: "hub"
      label: "Communication Hub"
      environment_class: outdoor
      x: 0.0
      y: 0.0
      z: 0.0
      is_recharge_point: true

    - node_id: "node_a"
      label: "Coverage Zone Alpha"
      environment_class: outdoor
      x: 20.0
      y: 20.0
      z: 0.0
      is_recharge_point: false

    - node_id: "node_b"
      label: "Coverage Zone Beta"
      environment_class: outdoor
      x: 20.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

    - node_id: "node_c"
      label: "Coverage Zone Gamma"
      environment_class: outdoor
      x: 20.0
      y: -20.0
      z: 0.0
      is_recharge_point: false

    - node_id: "node_d"
      label: "Coverage Zone Delta"
      environment_class: outdoor
      x: 40.0
      y: 0.0
      z: 0.0
      is_recharge_point: false

  edges:
    - edge_id: "e_hub_a"
      source: "hub"
      target: "node_a"
      terrain_type: road_lane
      distance: 28.0
      bidirectional: true

    - edge_id: "e_hub_b"
      source: "hub"
      target: "node_b"
      terrain_type: road_lane
      distance: 20.0
      bidirectional: true

    - edge_id: "e_hub_c"
      source: "hub"
      target: "node_c"
      terrain_type: road_lane
      distance: 28.0
      bidirectional: true

    - edge_id: "e_node_b_d"
      source: "node_b"
      target: "node_d"
      terrain_type: road_lane
      distance: 20.0
      bidirectional: true

initial_state:
  units:
    - unit_id: "relay_01"
      unit_type: mobile_relay
      location: "hub"
      energy: 40.0

    - unit_id: "relay_02"
      unit_type: mobile_relay
      location: "hub"

  objects: []

  targets:
    - target_id: "tgt_cov_alpha"
      target_type: coverage
      location: "node_a"
      metadata:
        coverage_mode: communication

    - target_id: "tgt_cov_beta"
      target_type: coverage
      location: "node_b"
      metadata:
        coverage_mode: communication

    - target_id: "tgt_cov_gamma"
      target_type: coverage
      location: "node_c"
      metadata:
        coverage_mode: communication

    - target_id: "tgt_cov_delta"
      target_type: coverage
      location: "node_d"
      metadata:
        coverage_mode: communication

workload:
  missions:
    - mission_id: "m_coverage"
      family: maintain_coverage
      priority: high
      release_tick: 0
      deadline_tick: null
      connectivity_requirement: continuous
      risk_budget: 10.0
      assigned_units:
        - "relay_01"
        - "relay_02"
      params:
        coverage_mode: communication
        target_ids:
          - "tgt_cov_alpha"
          - "tgt_cov_beta"
          - "tgt_cov_gamma"
          - "tgt_cov_delta"
        min_fraction: 0.75

disturbances:
  - disturbance_id: "d_road_block_a"
    trigger_tick: 100
    resolve_tick: 200
    affected_edges:
      - "e_hub_a"
      - "e_hub_a_rev"
    affected_nodes: []
    effect: block
    magnitude: 1.0

benchmark:
  max_ticks: 800
  record_interval: 10
  reward_shaping: none

generators: {}
